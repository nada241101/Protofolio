<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09090b" />
    <meta name="description" content="Nada Essam Mohammed Amin - AI Engineer, Data Analyst & Business Intelligence Specialist. Portfolio showcasing AI platforms, RAG systems, ViTs, Power BI analytics, and research." />
    
    <!-- Preconnect Google Fonts for High Speed -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <title>Nada Essam | AI Engineer & Data Analyst Portfolio</title>
    <script>
      // Default to Dark Mode unless explicitly saved as light
      try {
        const saved = localStorage.getItem('theme');
        if (saved === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {
        document.documentElement.classList.add('dark');
      }
    </script>
  </head>
  <body class="bg-surface-light text-text-primary-light dark:bg-surface-dark dark:text-text-primary-dark min-h-screen antialiased transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
